name: Rotate VidaXL Sale Groups

# Runs automatically on the 1st of each month at 02:00 UTC.
# Compliance gate inside rotate_groups.py refuses to run if last rotation
# was less than 25 days ago (Omnibus 4.4-rule). Use force=true to override.

on:
  schedule:
    - cron: '0 2 1 * *'  # 02:00 UTC, 1st of every month
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute and write CSV, but DO NOT update Supabase or save rotation state"
        type: boolean
        default: false
      force:
        description: "Override the 25-day rotation gate"
        type: boolean
        default: false

jobs:
  rotate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Rotate groups
      id: rotate
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        ARGS=""
        if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
        if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
        python scripts/rotate_groups.py $ARGS | tee rotate_output.txt
        # Capture summary for Slack
        ENDED=$(grep -oE 'Ended sale on [0-9]+' rotate_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        STARTED=$(grep -oE 'Started sale on [0-9]+' rotate_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        ACTIVE=$(grep -oE 'active_group=[ABC]' rotate_output.txt | head -1 | cut -d= -f2 || echo "?")
        echo "ended=$ENDED" >> $GITHUB_OUTPUT
        echo "started=$STARTED" >> $GITHUB_OUTPUT
        echo "active=$ACTIVE" >> $GITHUB_OUTPUT

    - name: Commit rotation CSV
      if: ${{ inputs.dry_run != true }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/price_updates.csv
        git commit -m "Rotation $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
        git push

    - name: Slack notify on success
      if: ${{ success() && inputs.dry_run != true }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -s -X POST -H 'Content-Type: application/json' \
          --data "{\"text\": \":arrows_counterclockwise: *VidaXL rotation gennemført* — gruppe ${{ steps.rotate.outputs.active }} er nu aktiv. Endte salg på ${{ steps.rotate.outputs.ended }} produkter, startede salg på ${{ steps.rotate.outputs.started }} produkter. Matrixify importerer fra price_updates.csv på næste schedule.\"}" \
          "$SLACK_WEBHOOK_URL"

    - name: Slack notify on failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -s -X POST -H 'Content-Type: application/json' \
          --data "{\"text\": \":x: *VidaXL rotation FEJLEDE* — kør ${{ github.run_id }}. Tjek logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK_URL"
