name: Rotate VidaXL Sale Groups

# Runs automatically on the 1st of each month at 02:00 UTC.
# Compliance gate inside rotate_groups_v2.py refuses to run if last rotation
# was less than 25 days ago (Omnibus 4.4-rule). Use force=true to override.
#
# Cutover 2026-06-02 (commit ac2724ab): rotate_groups_v2.py (direct API +
# Bulk Operations + pre-flight snapshot). Validation FOER cutover:
#   - Shadow CSV-diff: 107.942 rows identical
#   - Bulk Operations + cost-in-variant: SKUs 3197629/315475/3256389 round-trip
#   - On_sale compareAt semantics: SKU 853202 (KEEP+CLEAR)

on:
  schedule:
    - cron: '0 2 1 * *'  # 02:00 UTC, 1st of every month
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute and writes CSV, but DO NOT update Supabase or push til Shopify"
        type: boolean
        default: false
      force:
        description: "Override the 25-day rotation gate"
        type: boolean
        default: false

concurrency:
  group: rotate-groups-monthly
  cancel-in-progress: false  # rotation skal ALDRIG kanselleres midt-i

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Bulk Operations til 100k+ mutations + snapshot

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Rotate groups (direct API, Bulk Operations)
      id: rotate
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
      run: |
        set -o pipefail
        ARGS=""
        if [ "${{ inputs.dry_run }}" = "true" ]; then
          ARGS="$ARGS --dry-run"
        else
          ARGS="$ARGS --live"
        fi
        if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi

        # Fang scriptets exit-kode UDEN at 'set -e' afbryder, saa vi kan skelne:
        #   0 = rotation gennemfoert
        #   2 = 25-dages Omnibus-gate (legitimt skip, IKKE en fejl)
        #   andet = aegte crash -> step skal fejle saa fejl-Slack fyrer.
        # (Foer: 'python ... | tee' maskerede ALLE exit-koder -> crash saa ud
        #  som success og ingen alarm. Det skjulte de doede maj/juni-koersler.)
        set +e
        python scripts/rotate_groups_v2.py $ARGS | tee rotate_output.txt
        RC=${PIPESTATUS[0]}
        set -e
        echo "rc=$RC"
        if [ "$RC" = "2" ]; then
          echo "Gate: rotation sprunget over (<25 dage siden sidst) — ikke en fejl."
          echo "skipped=true" >> $GITHUB_OUTPUT
        elif [ "$RC" != "0" ]; then
          echo "Rotation fejlede med exit $RC"
          exit $RC
        fi

        # Opsummering til Slack (parser v2's faktiske output-format).
        ENDED=$(grep -oE 'Ended sale on [0-9]+' rotate_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        STARTED=$(grep -oE 'Started sale on [0-9]+' rotate_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
        ACTIVE=$(grep -oE 'Started sale on [0-9]+ products i group [ABC]' rotate_output.txt | grep -oE 'group [ABC]' | grep -oE '[ABC]$' | head -1 || echo "?")
        echo "ended=$ENDED" >> $GITHUB_OUTPUT
        echo "started=$STARTED" >> $GITHUB_OUTPUT
        echo "active=$ACTIVE" >> $GITHUB_OUTPUT

    - name: Commit state + audit trail (snapshot)
      if: ${{ inputs.dry_run != true }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Snapshot ligger i output/rotation_snapshots/ — committes som audit trail.
        # price_updates.csv er tom (Matrixify-neutralisering).
        git add output/price_updates.csv output/rotation_snapshots/ || true
        git commit -m "Rotation $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
        git push

    - name: Slack notify on success
      if: ${{ success() && inputs.dry_run != true && steps.rotate.outputs.skipped != 'true' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -s -X POST -H 'Content-Type: application/json' \
          --data "{\"text\": \":arrows_counterclockwise: *VidaXL rotation gennemført (direct API)* — gruppe ${{ steps.rotate.outputs.active }} er nu aktiv. Endte salg på ${{ steps.rotate.outputs.ended }} produkter, startede salg på ${{ steps.rotate.outputs.started }} produkter via Bulk Operations.\"}" \
          "$SLACK_WEBHOOK_URL"

    - name: Slack notify on gate-skip
      if: ${{ success() && inputs.dry_run != true && steps.rotate.outputs.skipped == 'true' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -s -X POST -H 'Content-Type: application/json' \
          --data "{\"text\": \":hourglass_flowing_sand: *VidaXL rotation sprunget over* — mindre end 25 dage siden sidste rotation (Omnibus-gate). Ingen ændringer foretaget.\"}" \
          "$SLACK_WEBHOOK_URL"

    - name: Slack notify on failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -s -X POST -H 'Content-Type: application/json' \
          --data "{\"text\": \":x: *VidaXL rotation FEJLEDE* — kør ${{ github.run_id }}. Tjek logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK_URL"
