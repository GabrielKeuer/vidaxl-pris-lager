name: Sollux Inventory Sync

on:
  # Kør hver 1. time
  schedule:
    - cron: '0 */1 * * *'

  # Manuel trigger
  workflow_dispatch:

# Cancel-in-progress: hvis et job er stuck (GitHub-runner allocation hænger),
# bliver det automatisk dræbt når næste hourly-run starter — i stedet for
# 15-min "cancelled at setup"-mønstret vi så historisk.
concurrency:
  group: sollux-inventory-sync
  cancel-in-progress: true

jobs:
  sync-sollux:
    runs-on: ubuntu-latest
    # Bail-out efter 10 min så vi ikke hænger i GitHub's 15-min cancel-pattern.
    # Normal kørsel tager 30-60 sek; 10 min er rigeligt margin.
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔄 Sync Sollux inventory
        env:
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: |
          python scripts/sync_sollux_inventory.py
      
      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sollux-sync-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
      
      - name: 🔔 Notify on repeated failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Sollux-endpointet er intermitterende — et enkelt blip fikser sig
            // typisk næste time. For at undgå støj alarmerer vi KUN når den
            // forrige kørsel også fejlede (2+ fortløbende fejl = ægte nedetid).
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo,
              workflow_id: 'sollux-inventory-sync.yml',
              status: 'completed',
              per_page: 5,
            });
            const previous = runs.data.workflow_runs
              .filter(r => r.id !== context.runId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (!previous || previous.conclusion !== 'failure') {
              console.log(`Enkeltstående fejl (forrige kørsel: ${previous ? previous.conclusion : 'ingen'}) — ingen alarm.`);
              return;
            }

            // 2+ fortløbende fejl. Undgå dublet hvis der allerede er en åben issue.
            const title = '❌ Sollux Inventory Sync Failed';
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'sollux', per_page: 20,
            });
            if (open.data.some(i => i.title === title)) {
              console.log('Åben Sollux-issue findes allerede — opretter ikke ny.');
              return;
            }

            await github.rest.issues.create({
              owner, repo, title,
              body: `Sollux inventory sync fejlede 2+ kørsler i træk (seneste: ${new Date().toISOString()}).\n\nDette indikerer reel nedetid hos apps.sollux-lighting.com, ikke et enkeltstående blip.\n\nCheck [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
              labels: ['sollux', 'bug', 'automated'],
            });
---

## 📋 **Step 4: Test det manuelt**

1. Gå til **Actions** tab i GitHub
2. Vælg **Sollux Inventory Sync** workflow
3. Klik **Run workflow** → **Run workflow**
4. Se logs i real-time

---

## 📊 **Fordele ved denne løsning:**

✅ **Simpel:** Opdaterer bare alt hver gang (da det kun er ~1400 produkter)
✅ **Hurtig:** ~30-60 sekunder total
✅ **Automatisk:** Kører hver 1. time
✅ **Fejlhåndtering:** Logger alt og sender notifikationer
✅ **Samlet:** I samme repo som VidaXL

---

## 🔧 **Workflow oversigt:**
```
Hver 6. time:
  ↓
📥 Download CSV fra Sollux
  ↓
📋 Parse 1400+ produkter
  ↓
📍 Find Shopify location
  ↓
🔍 Match SKUs → inventory IDs
  ↓
🔄 Opdater lager (100 per batch)
  ↓
📊 Log resultater
  ↓
✅ Done!
