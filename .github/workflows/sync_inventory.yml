name: Sync Inventory Hourly
on:
  schedule:
    - cron: '45 * * * *'  # 45 min efter hver time
  workflow_dispatch:

# Cancel-in-progress (samme moenster som Sollux/Benuta fix 2026-06-02)
concurrency:
  group: sync-inventory-hourly
  cancel-in-progress: true

jobs:
  sync-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Normal ~5 min, peak ~8 min ved 18k aendringer

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests pandas

    # === LIVE direct-API kald siden cutover 2026-06-02 (commit 35846a72) ===
    # Tidligere: scripts/sync_inventory.py emitterede CSV, Matrixify pollede CSV
    #            paa sin egen schedule og kaldte Shopify.
    # Nu:        sync_inventory_v2 --live kalder inventorySetOnHandQuantities
    #            direkte i batches af 100. Validerer FOER cutover via:
    #              - CSV-diff (workflow shadow-step, 154 rows identical)
    #              - Round-trip canary (SKU 3119174: 10 -> 11 -> 10 verified)

    - name: Sync inventory (direct API)
      env:
        SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
      run: |
        python scripts/sync_inventory_v2.py --live

    - name: Commit state + neutralized CSV
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # state/last_inventory.csv = naeste runs diff-grundlag (commit som foer)
        # output/inventory_updates.csv = nu TOM fil (Matrixify-neutralisering)
        git add output/inventory_updates.csv state/last_inventory.csv
        git commit -m "Inventory sync - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
        git push

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Inventory sync v2 (direct API) failed',
            body: 'sync_inventory_v2 --live failed. Check the Actions tab.'
          })
