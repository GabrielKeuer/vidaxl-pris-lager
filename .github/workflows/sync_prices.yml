name: Sync Prices Daily

on:
  schedule:
    - cron: '0 8 * * *'  # Kl. 10:00 dansk tid (UTC+2 om sommeren)
  workflow_dispatch:

concurrency:
  group: sync-prices-daily
  cancel-in-progress: true

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Normal ~5 min, headroom for store on_sale-drift dage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # === LIVE direct-API kald siden cutover 2026-06-02 ===
    # Tidligere: scripts/sync_prices.py emitterede merged CSV (158k rows),
    #            Matrixify pollede CSV paa sin egen schedule og kaldte Shopify.
    # Nu:        sync_prices_v2 --live kalder productVariantsBulkUpdate +
    #            inventoryItemUpdate direkte. Validation FOER cutover:
    #              - CSV-diff: 158844 rows identical
    #              - Round-trip canary (price): SKU 862071 (799→800→799)
    #              - On_sale canary (KEEP+CLEAR semantics): SKU 853202
    #
    # On_sale rettelse: cost+price opdateres ved b2b-drift, compareAt laast.
    # Edge case (sale >= compareAt) ryd compareAt + brug nyt sale-niveau.

    - name: Sync prices (direct API)
      env:
        SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        python scripts/sync_prices_v2.py --live

    - name: Commit state + audit trail
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # price_updates.csv = tom (Matrixify-neutralisering)
        # on_sale_diffs.csv = audit trail af on_sale aendringer der blev pushed
        git add output/price_updates.csv output/on_sale_diffs.csv
        git commit -m "Price sync - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
        git push

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Price sync v2 (direct API) failed',
            body: 'sync_prices_v2 --live failed. Check Actions tab.'
          })
