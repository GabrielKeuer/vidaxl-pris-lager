name: Sync Prices Daily

on:
  schedule:
    - cron: '0 8 * * *'  # Kl. 10:00 dansk tid (UTC+2 om sommeren)
  workflow_dispatch:

concurrency:
  group: sync-prices-daily
  cancel-in-progress: true

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Bulk Operations kan tage 15+ min for store catch-ups

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # === LIVE direct-API siden cutover 2026-06-02 (commit 7c20f91b refactor) ===
    # Auto-vaelg Niveau 2 (<1000 changes) eller Niveau 3 (Bulk Operations).
    # Validation FOER cutover:
    #   - CSV-diff: 158844 rows identical (commit ce003697)
    #   - Round-trip canary (price): SKU 862071 (799→800→799)
    #   - On_sale compareAt semantics: SKU 853202 (KEEP+CLEAR)
    #   - Bulk + cost-in-variant: 3 SKUs round-trip (commit 8708f708)

    - name: Sync prices (direct API, auto Niveau 2/3)
      env:
        SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scripts/sync_prices_v2.py --live

    - name: Commit state + audit trail
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/price_updates.csv output/on_sale_diffs.csv
        git commit -m "Price sync - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
        git push

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Price sync v2 (direct API) failed',
            body: 'sync_prices_v2 --live failed. Check Actions tab.'
          })
