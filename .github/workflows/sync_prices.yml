name: Sync Prices Daily

on:
  schedule:
    - cron: '0 8 * * *'  # Kl. 10:00 dansk tid (UTC+2 om sommeren)
  workflow_dispatch:

concurrency:
  group: sync-prices-daily
  cancel-in-progress: true

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Normal ~5 min, headroom for store on_sale-drift dage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # === REVERTET TIL SHADOW-MODE 2026-06-02 ===
    # Forsoeg paa cutover (commit 85a0c298) fejlede pga. 20-min timeout.
    # 30k+ mutations ved Niveau 2 (regular GraphQL) tager ~4 timer pga.
    # Shopify rate limit (50 points/sec). Vi skal bruge Bulk Operations
    # (Niveau 3) for foerste catch-up run. Daglige runs efter catch-up er
    # smaa (50-500 changes) og kan koere paa Niveau 2.

    - name: 🟢 NEW — sync_prices_v2 (dry-run, read-only state)
      env:
        SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scripts/sync_prices_v2.py --skip-state-save

    - name: 🔵 OLD — sync_prices (Matrixify-CSV path)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scripts/sync_prices.py

    - name: 🔍 VALIDATE — compare old vs new CSV
      run: python scripts/_compare_prices_csvs.py

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/price_updates.csv output/new_price_updates.csv output/on_sale_diffs.csv
        git commit -m "Price sync - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
        git push

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Price sync v2 (direct API) failed',
            body: 'sync_prices_v2 --live failed. Check Actions tab.'
          })
