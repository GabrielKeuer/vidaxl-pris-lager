name: Analyze Duplicate SKUs

on:
  schedule:
    - cron: '0 3 1 * *'   # 1. i hver måned 03:00 UTC — automatisk dublet-scan
  workflow_dispatch:
    inputs:
      vendor:
        description: 'Vendor (default vidaXL)'
        required: false
        default: 'vidaXL'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Analyze duplicate SKUs (read-only) + skriv til Supabase
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DUP_VENDOR: ${{ github.event.inputs.vendor || 'vidaXL' }}
        run: python scripts/analyze_dup_skus.py
      - name: Upload cluster report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dup-clusters
          path: output/dup_clusters.json
