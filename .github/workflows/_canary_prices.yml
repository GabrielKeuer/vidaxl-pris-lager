name: Canary - sync_prices_v2 end-to-end

# Manuel trigger. Round-trip test: laeser en SKUs current price, saetter
# midlertidigt til +1, bekraefter aendring, restorer til original. Beviser
# at productVariantsBulkUpdate-mutation virker.
#
# Cost: SKU er kortvarigt +1 kr (mellem 2 mutations = ~3-5 sek). Acceptabel
# valideringscost.

on:
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run canary (round-trip price update)
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
        run: python scripts/_canary_prices_v2.py
