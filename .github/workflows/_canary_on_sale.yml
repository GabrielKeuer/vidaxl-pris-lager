name: Canary - on_sale compareAt semantics

# Validerer at:
#   - Omit compareAtPrice fra mutation -> Shopify bevarer eksisterende vaerdi
#   - Eksplicit null -> Shopify rydder vaerdien
#
# Round-trip pr. test: price aendres midlertidigt, restored ved exit.
# Net change: 0.

on:
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run on_sale canary
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
        run: python scripts/_canary_on_sale_v2.py
