name: Merge Executor (katalog-konsolidering)

# KATALOG-MERGE: konsoliderer dublet/variant-produkter over ~40 dage (~1000 varianter/dag).
# SIKKERHED: on/off = om workflowen er ENABLED i GitHub. Styres fra Hub → Katalog → Merge-status
#   (toggler via GitHubs workflow enable/disable). Disabled → cron fyrer ikke. Manuel kørsel
#   (workflow_dispatch) defaulter til dry-run. Journal + genoptagelse via merge_exec_log (idempotent).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run | canary | live'
        required: true
        default: 'dry-run'
      budget:
        description: 'Max variant-creates (live/schedule)'
        required: false
        default: '1000'
      canary:
        description: 'Antal grupper i canary-mode'
        required: false
        default: '10'
  schedule:
    - cron: '0 4 * * *'   # dagligt 04:00 UTC — no-op medmindre MERGE_EXECUTE_LIVE=true

concurrency:
  group: merge-executor
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests pandas beautifulsoup4 supabase
      - name: Kør merge-executor
        env:
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FEED_URL: ${{ vars.FEED_URL }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # ON/OFF styres nu af om selve workflowen er ENABLED i GitHub (Hub → Katalog → Merge-status
            # toggler den via GitHubs workflow enable/disable). Disabled workflow → cron fyrer slet ikke.
            # Enabled → daglig LIVE-batch. Ingen MERGE_EXECUTE_LIVE-variabel længere.
            echo "▶ Daglig LIVE-batch (budget ${{ vars.MERGE_DAILY_BUDGET || '1000' }})"
            python scripts/merge_executor.py --live --budget "${{ vars.MERGE_DAILY_BUDGET || '1000' }}"
          else
            MODE="${{ github.event.inputs.mode }}"
            if [ "$MODE" = "live" ]; then
              python scripts/merge_executor.py --live --budget "${{ github.event.inputs.budget }}"
            elif [ "$MODE" = "canary" ]; then
              python scripts/merge_executor.py --live --canary "${{ github.event.inputs.canary }}"
            else
              python scripts/merge_executor.py --dry-groups 10
            fi
          fi
